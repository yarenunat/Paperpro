<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Paper Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="journal-screen" class="screen active">
        </div>

    <div id="canvas-screen" class="screen paper-bg">
        <div class="top-nav">
            <button id="closeBtn" class="icon-btn" title="Geri">✕</button>
            <div class="history-btns">
                <button id="clearBtn" class="icon-btn" title="Temizle">🗑️</button>
                <button id="undoBtn" class="icon-btn" title="Geri Al">↶</button>
            </div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="toolbar-container">
            <div class="toolbar">
                <div class="palette-row">
                    <input type="file" id="stickerInput" accept="image/*" style="display: none;">
                    <button class="icon-btn sm" id="addStickerBtn" title="Resim Ekle">🖼️</button>
                    
                    <div class="colors" id="colorPalette">
                        <div class="color-dot active" style="background: #2c3e50;" data-color="#2c3e50"></div>
                        <div class="color-dot" style="background: #e74c3c;" data-color="#e74c3c"></div>
                        <div class="color-dot" style="background: #ffffff;" data-color="#ffffff"></div>
                    </div>
                    <button class="icon-btn sm" id="saveBtn" title="Kaydet">📥</button>
                </div>
                
                <div class="tools-row" id="toolsRow">
                    <div class="tool" data-tool="eraser"><img src="eraser.png" alt="Silgi"></div>
                    <div class="tool active" data-tool="fountain"><img src="fountain_pen.png" alt="Dolma Kalem"></div>
                    <div class="tool" data-tool="ballpoint"><img src="ballpoint_pen.png" alt="Tükenmez Kalem"></div>
                    <div class="tool" data-tool="charcoal"><img src="charcoal.png" alt="Karakalem"></div>
                    <div class="tool" data-tool="marker"><img src="marker.png" alt="Fosforlu"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
